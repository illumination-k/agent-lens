# Configuration for cargo-mutants.
# https://mutants.rs/

# Use cargo-nextest, matching the project's standard test runner.
test_tool = "nextest"

# Match the normal Rust verification surface.
all_features = true
additional_cargo_args = ["--locked"]

# Allow generous slack over the baseline test runtime; mutations sometimes
# trigger pathological loops in similarity / edit-distance code.
timeout_multiplier = 2.0
minimum_test_timeout = 60

# Skip the binary entrypoint and other thin glue. Logic worth covering lives in
# the library crates.
exclude_globs = [
  "crates/agent-lens/src/main.rs",
]

# Skip functions whose only contract is to populate Halstead operator/operand
# label keys. Mutating their bodies just renames a map key and has no
# observable effect on the cyclomatic / cognitive / nesting numbers an
# analyzer is judged on, so a missed mutant here is a known equivalent
# rather than a real test gap. The `enter_nest` boundary is similarly
# equivalent: writing `>=` instead of `>` produces the same final
# `max_nesting` value, just with one extra idempotent write.
exclude_re = [
  # complexity: per-stmt / per-expr Halstead label dispatchers
  "ComplexityVisitor::record_stmt_halstead",
  "ComplexityVisitor::record_expr_halstead",
  "ComplexityVisitor::record_finally",
  "ComplexityVisitor::enter_nest",
  # complexity: pure label-mapping helpers
  "cmp_op_str",
  "number_literal_repr",
  # similarity: tracing-only telemetry helpers
  "log_candidate_stats",
  "log_score_stats",
  # similarity: complete-clique fast path is a performance shortcut that
  # produces identical clusters to the heap-based merge loop, so any mutant
  # turning the predicate into `None`/`always-false` is observationally
  # equivalent to the slow path under behaviour-only assertions.
  "try_complete_clique",
]
