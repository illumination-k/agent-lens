name: Mutation Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      MISE_ENV: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Build baseline
        run: cargo build --locked --workspace --all-features --tests

      - name: Run cargo-mutants on PR diff
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "${BASE_REF}"
          git diff "origin/${BASE_REF}"...HEAD > pr.diff
          cargo mutants --workspace --no-shuffle --in-diff pr.diff

      - name: Run cargo-mutants on full workspace
        if: github.event_name == 'workflow_dispatch'
        run: cargo mutants --workspace --no-shuffle

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutants-report
          path: mutants.out
          if-no-files-found: ignore
