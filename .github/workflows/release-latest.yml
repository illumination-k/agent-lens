name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
      - "mise.rust.toml"
      - "mise.base.toml"
      - "README.md"
      - "install.sh"
      - ".github/workflows/release-latest.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      MISE_ENV: rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false

      - name: Add rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin agent-lens

      - name: Package archive (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          dir="agent-lens-${TARGET}"
          mkdir -p "${dir}"
          cp "target/${TARGET}/release/agent-lens" "${dir}/"
          cp README.md "${dir}/"
          tar -czf "${dir}.tar.gz" "${dir}"
          shasum -a 256 "${dir}.tar.gz" > "${dir}.tar.gz.sha256"

      - name: Package archive (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $ErrorActionPreference = "Stop"
          $dir = "agent-lens-$env:TARGET"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item "target\$env:TARGET\release\agent-lens.exe" "$dir\"
          Copy-Item "README.md" "$dir\"
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"
          (Get-FileHash "$dir.zip" -Algorithm SHA256).Hash | Out-File -Encoding ascii "$dir.zip.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: agent-lens-${{ matrix.target }}
          path: |
            agent-lens-*.tar.gz
            agent-lens-*.tar.gz.sha256
            agent-lens-*.zip
            agent-lens-*.zip.sha256
          retention-days: 1
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          if [ "${REF_TYPE}" = "branch" ]; then
            if [ "${REF_NAME}" != "main" ]; then
              echo "Rolling prereleases are only published from main; got ${REF_NAME}." >&2
              exit 1
            fi

            short_sha="$(printf '%s' "${SHA}" | cut -c1-12)"
            gh release delete rolling --cleanup-tag --yes || true
            gh release create rolling \
              --target "${SHA}" \
              --title "rolling main (${short_sha})" \
              --notes "Rolling prerelease built from \`main\` at ${SHA}." \
              --prerelease \
              dist/*
            exit 0
          fi

          if [ "${REF_TYPE}" = "tag" ]; then
            gh release create "${REF_NAME}" \
              --title "${REF_NAME}" \
              --generate-notes \
              dist/*
            exit 0
          fi

          echo "Unsupported ref type: ${REF_TYPE}" >&2
          exit 1
