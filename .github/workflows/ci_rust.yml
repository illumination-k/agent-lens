name: CI Rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      MISE_ENV: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # mise's rust plugin doesn't reliably honour the `components`
      # setting in mise.rust.toml when `version = "latest"` resolves to a
      # toolchain rustup hasn't seen before, so install them explicitly.
      - name: Ensure Rust components
        run: rustup component add clippy rustfmt llvm-tools-preview

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Build
        run: cargo build --locked --workspace --all-features

      - name: CI
        run: mise run ci:rust

      - name: Generate coverage report
        run: cargo llvm-cov nextest --locked --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
          files: lcov.info
          flags: rust
          fail_ci_if_error: true
          verbose: true
