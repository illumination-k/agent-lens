# :schema https://developers.openai.com/codex/config-schema.json

[shell_environment_policy]
# Avoid forcing a Rust toolchain in Codex-spawned commands.
# This lets mise/rust-toolchain selection work as intended.
exclude = ["^RUSTUP_TOOLCHAIN$"]

[shell_environment_policy.set]
# Mirror the Claude project env defaults so mise resolves the same task groups.
MISE_ENV = "base,rust,ts,security"

[features]
# Ensure Codex lifecycle hooks are enabled for this repository.
codex_hooks = true
