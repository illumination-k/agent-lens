[tools]
uv = "0.11.5"
dprint = "0.54.0"
prek = "0.3.8"
shfmt = "3.13.1"
actionlint = "1.7.12"
"pipx:zizmor" = "1.23.1"
shellcheck = "0.11.0"
"aqua:suzuki-shunsuke/ghalint" = "1.5.5"
"aqua:suzuki-shunsuke/pinact" = "3.9.0"

[hooks]
postinstall = "if [ -z \"${CI:-}\" ]; then prek install -f; fi"

[tasks."fmt:base"]
description = "Format with dprint and shfmt"
run = [
  "dprint fmt",
  "git ls-files -z -- '*.sh' | xargs -0 shfmt -w",
]

[tasks."lint:base"]
description = "Lint with dprint, shfmt, shellcheck"
run = [
  "dprint check",
  "git ls-files -z -- '*.sh' | xargs -0 shfmt -d",
  "git ls-files -z -- '*.sh' | xargs -0 shellcheck",
]

[tasks."lint:gha"]
description = "Lint GitHub Actions workflows and policies"
run = [
  "actionlint",
  "zizmor .",
  "ghalint run",
  "pinact run",
]
