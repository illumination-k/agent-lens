[tools]
rust = { version = "1.93.1", profile = "default", components = "rustfmt,clippy,llvm-tools-preview" }
"aqua:cargo-bins/cargo-binstall" = "1.18.1"

[tools."cargo:cargo-nextest"]
version = "0.9.132"
depends = ["aqua:cargo-bins/cargo-binstall"]

[tools."cargo:cargo-deny"]
version = "0.19.0"
depends = ["aqua:cargo-bins/cargo-binstall"]

[tools."cargo:cargo-audit"]
version = "0.22.1"
depends = ["aqua:cargo-bins/cargo-binstall"]

[tools."cargo:cargo-mutants"]
version = "27.0.0"
depends = ["aqua:cargo-bins/cargo-binstall"]

[tools."cargo:cargo-llvm-cov"]
version = "0.6.21"
depends = ["aqua:cargo-bins/cargo-binstall"]

[tasks."fmt:rust"]
description = "Format Rust code with cargo fmt"
run = "cargo fmt --all"

[tasks."lint:rust"]
description = "Lint Rust with clippy, fmt check, cargo-deny, cargo-audit"
run = [
  "cargo clippy --all-targets --all-features -- -D warnings",
  "cargo fmt --all --check",
  "cargo deny check",
  "cargo audit",
]

[tasks."test:rust"]
description = "Run Rust tests with cargo-nextest"
run = "cargo nextest run --locked --all-features"

[tasks."test:rust:doc"]
description = "Run Rust doctests (cargo-nextest does not run them)"
run = "cargo test --doc --locked --all-features --workspace"

[tasks."mutants:rust"]
description = "Run mutation tests with cargo-mutants (slow; use --in-diff origin/main for PRs)"
run = "cargo mutants --workspace --no-shuffle"

[tasks."mutants:rust:diff"]
description = "Run cargo-mutants only on lines changed vs a base git ref (default: main)"
run = '''
set -euo pipefail
base="${1:-main}"
mkdir -p target
git diff "$base" -- '*.rs' > target/mutants-diff.patch
cargo mutants --workspace --no-shuffle --in-diff target/mutants-diff.patch
'''

[tasks."ci:rust"]
description = "Run Rust lint and test tasks"
depends = ["lint:rust", "test:rust", "test:rust:doc"]
